name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -clean -platform windows/amd64 -o StationHub

      - name: Inspect build output
        shell: pwsh
        run: |
          Get-ChildItem -Path build/bin -Recurse -File |
            Select-Object FullName, Length, LastWriteTime

      - name: Package
        shell: pwsh
        run: |
          $assetName = "StationHub-${{ github.ref_name }}-windows-amd64"
          $exe = Get-ChildItem -Path build/bin -Recurse -File -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*~" } |
            Sort-Object Length -Descending |
            Select-Object -First 1
          if (-not $exe) {
            throw "No Windows executable found under build/bin after wails build."
          }
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path $exe.FullName -DestinationPath "release/$assetName.zip" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: release/*.zip
          if-no-files-found: error

  release:
    name: Create or update GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
