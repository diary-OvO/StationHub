name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -v 2 -clean -platform windows/amd64 -o llm-station-hub -ldflags "-X main.appVersion=${{ github.ref_name }}"

      - name: Inspect build output
        shell: pwsh
        run: |
          if (Test-Path build) {
            Get-ChildItem -Path build -Recurse -Force |
              Select-Object FullName, Length, LastWriteTime
          } else {
            Write-Host "build directory does not exist"
          }

      - name: Package
        shell: pwsh
        run: |
          $assetName = "llm-station-hub-${{ github.ref_name }}-windows-amd64"
          if (-not (Test-Path build/bin)) {
            throw "build/bin does not exist after wails build."
          }

          $binaries = Get-ChildItem -Path build/bin -Recurse -Force -File |
            Where-Object { $_.Name -notlike "*~" } |
            Sort-Object Length -Descending

          $binary = $binaries |
            Where-Object { $_.Extension -ieq ".exe" } |
            Select-Object -First 1

          if (-not $binary) {
            $binary = $binaries |
              Where-Object { $_.Name -eq "llm-station-hub" -or $_.BaseName -eq "llm-station-hub" } |
              Select-Object -First 1
          }

          if (-not $binary) {
            $listed = ($binaries | ForEach-Object { $_.FullName }) -join "`n"
            throw "No Windows application binary found under build/bin after wails build. Files:`n$listed"
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item -LiteralPath $binary.FullName -Destination "release/$assetName.exe" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: release/*.exe
          if-no-files-found: error

  release:
    name: Create or update GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
